services:
  - type: web
    name: snap-studio-web
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: TRANSCRIBE_PROVIDER
        value: groq
      - key: GROQ_TRANSCRIBE_MODEL
        value: whisper-large-v3-turbo
      - key: SEPAY_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: ADMIN_UIDS
        sync: false
